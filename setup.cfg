[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service

[flake8]
# Exclude standard virtual environments and git directories
exclude = .git,.venv,venv,__pycache__,docs/source/conf.py,old,build,dist
# Standard DevOps capstone max line length rule
max-line-length = 127
# Flake8 ignores can be specified here if needed
ignore = E402

[pylint]
# Exclude standard virtual environments from linting
ignore = .git,.venv,venv,__pycache__
# Match the max line length rule used in flake8
max-line-length = 127
# Optional: Disable specific warnings if they interfere with your lab code
disable = C0111, R0903
