apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: lint
spec:
  workspaces:
    - name: source
  steps:
    - name: flake8
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: tests
spec:
  workspaces:
    - name: source
  sidecars:
    - name: postgres
      image: postgres:15
      env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: testdb
      readinessProbe:
        exec:
          command: ["pg_isready", "-U", "postgres"]
  steps:
    - name: pyunit
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: DATABASE_URI
          value: "postgresql://postgres:postgres@localhost:5432/testdb"
      script: |
        pip install -r requirements.txt
        nosetests
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build
spec:
  params:
    - name: repo-url
      type: string
  steps:
    - name: build-image
      image: alpine
      script: |
        echo "Building image for $(params.repo-url)"
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: deploy
spec:
  params:
    - name: repo-url
      type: string
    - name: branch
      type: string
  steps:
    - name: openshift-deploy
      image: alpine
      script: |
        echo "Deploying $(params.branch) branch of $(params.repo-url)"

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose
spec:
  description: This task will run nosetests on the provided input.
  workspaces:
    - name: source
  params:
    - name: args
      description: Arguments to pass to nose
      type: string
      default: "-v"
    - name: database_uri
      description: Database connection string
      type: string
      default: "sqlite:///test.db"
  steps:
      - name: nosetests
        image: python:3.9-slim
        workingDir: $(workspaces.source.path)
        env:
          - name: DATABASE_URI
            value: $(params.database_uri)
        script: |
          #!/bin/bash
          set -e

          echo "***** Installing dependencies *****"
          python -m pip install --upgrade pip wheel
          pip install -qr requirements.txt

          echo "***** Running nosetests with: $(params.args)"
          nosetests $(params.args)
